<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch-Übung: Richtig oder Falsch?</title>
    <style>
        :root {
            --primary-color: #2b6cb0;
            --primary-hover: #1a528d;
            --bg-color: #f7fafc;
            --card-bg: #ffffff;
            --text-color: #2d3748;
            --border-color: #cbd5e0;
            --success-color: #48bb78;
            --success-hover: #38a169;
            --error-color: #f56565;
            --error-hover: #e53e3e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-style: normal !important;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 5px;
            color: var(--primary-color);
            text-align: center;
        }

        .progress-indicator {
            text-align: center;
            font-size: 0.9rem;
            color: #718096;
            margin-bottom: 25px;
            font-weight: bold;
        }

        /* Behauptungs-Box */
        .statement-box {
            background-color: #f8fafc;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            padding: 25px;
            text-align: center;
            font-size: 1.25rem;
            font-weight: 500;
            margin-bottom: 25px;
            color: var(--text-color);
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Interaktions-Buttons */
        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        .btn-choice {
            padding: 15px 20px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .btn-true { background-color: var(--success-color); }
        .btn-true:hover { background-color: var(--success-hover); }
        .btn-false { background-color: var(--error-color); }
        .btn-false:hover { background-color: var(--error-hover); }

        .btn-choice:disabled {
            opacity: 0.2;
            cursor: not-allowed;
        }

        /* Auswertungs-Zustand */
        .btn-choice.selected-correct {
            opacity: 1 !important;
            transform: scale(1.03);
            box-shadow: 0 0 0 4px #c6f6d5;
        }

        .btn-choice.selected-incorrect {
            opacity: 1 !important;
            transform: scale(1.03);
            box-shadow: 0 0 0 4px #fed7d7;
        }

        /* Erklärungs-Box */
        .explanation-box {
            background-color: #ebf8ff;
            border-left: 4px solid var(--primary-color);
            padding: 15px;
            border-radius: 0 6px 6px 0;
            margin-bottom: 25px;
            font-size: 0.95rem;
            color: #2b6cb0;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Steuerung unten */
        .controls {
            display: flex;
            justify-content: center;
        }

        button.control-btn {
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-next { background-color: var(--primary-color); color: white; }
        .btn-next:hover { background-color: var(--primary-hover); }
        .btn-restart { background-color: #718096; color: white; }
        .btn-restart:hover { background-color: #4a5568; }

        .feedback {
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 1.1rem;
            min-height: 28px;
        }

        @media (max-width: 480px) {
            body { padding: 10px; }
            .container { padding: 20px 15px; }
            .statement-box { font-size: 1.1rem; padding: 15px; }
            .action-buttons { gap: 10px; }
            .btn-choice { padding: 12px 10px; font-size: 1.1rem; }
            h1 { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Richtig oder Falsch?</h1>
    <div class="progress-indicator" id="progress-box">Frage 1 von 4</div>

    <div id="quiz-content">
        <!-- Die Behauptung -->
        <div class="statement-box" id="statement-text">Behauptung wird geladen...</div>

        <!-- Auswahl-Buttons -->
        <div class="action-buttons">
            <button class="btn-choice btn-true" id="btn-true" onclick="handleAnswer(true)">Richtig</button>
            <button class="btn-choice btn-false" id="btn-false" onclick="handleAnswer(false)">Falsch</button>
        </div>

        <!-- Erklärung nach Klick -->
        <div class="explanation-box" id="explanation-box" style="display: none;"></div>
    </div>

    <!-- Steuerung -->
    <div class="controls">
        <button class="control-btn btn-next" id="next-button" onclick="nextQuestion()" style="display: none;">Nächste Aussage</button>
        <button class="control-btn btn-restart" id="restart-button" onclick="restartQuiz()" style="display: none;">Quiz Neustarten</button>
    </div>

    <div class="feedback" id="feedback-box"></div>
</div>

<script>
    // Aussagen-Katalog basierend auf deinen Lerninhalten
    const quizData = [
        {
            statement: "Die Phrase „как оно“ wird besonders häufig von älteren Menschen in formellen Briefen genutzt.",
            answer: false,
            explanation: "Falsch! „как оно“ (Wie läuft's so?) ist pure Umgangs- und Jugendsprache und gehört ausschließlich in ein informelles, lockeres Umfeld."
        },
        {
            statement: "Der Ausdruck „как настроение“ bedeutet übersetzt so viel wie „Wie ist die Stimmung?“ oder „Wie ist die Laune?“.",
            answer: true,
            explanation: "Richtig! Das ist die klassische und sehr gebräuchliche Variante, um sich nach dem Befinden und der Stimmung des anderen zu erkundigen."
        },
        {
            statement: "Auf die Frage nach dem Befinden antwortet Sprecher B im Dialog mit: „А все нормально новую работу нашла“.",
            answer: true,
            explanation: "Richtig! Sie entgegnet: „Alles normal, ich habe einen neuen Job gefunden.“"
        },
        {
            statement: "Wenn man im Russischen jemanden formell siezt, ist „как оно“ der perfekte Begrüßungssatz.",
            answer: false,
            explanation: "Falsch! Bei einer formellen Anrede (Sie) verbietet sich dieser Ausdruck, da er viel zu salopp ist. Hier nutzt man klassischere Formen."
        }
    ];

    let currentQuestionIndex = 0;
    let score = 0;
    let hasAnswered = false;

    const statementText = document.getElementById('statement-text');
    const btnTrue = document.getElementById('btn-true');
    const btnFalse = document.getElementById('btn-false');
    const explanationBox = document.getElementById('explanation-box');
    const feedbackBox = document.getElementById('feedback-box');
    const progressBox = document.getElementById('progress-box');
    const nextButton = document.getElementById('next-button');
    const restartButton = document.getElementById('restart-button');

    initQuestion();

    function initQuestion() {
        hasAnswered = false;
        explanationBox.style.display = 'none';
        nextButton.style.display = 'none';
        restartButton.style.display = 'none';
        feedbackBox.innerHTML = '';
        
        // Buttons zurücksetzen
        btnTrue.disabled = false;
        btnFalse.disabled = false;
        btnTrue.className = 'btn-choice btn-true';
        btnFalse.className = 'btn-choice btn-false';

        progressBox.innerText = `Aussage ${currentQuestionIndex + 1} von ${quizData.length}`;
        statementText.innerText = quizData[currentQuestionIndex].statement;
    }

    function handleAnswer(userChoice) {
        if (hasAnswered) return;
        hasAnswered = true;

        const currentQuestion = quizData[currentQuestionIndex];
        const isCorrect = (userChoice === currentQuestion.answer);

        // Buttons deaktivieren
        btnTrue.disabled = true;
        btnFalse.disabled = true;

        if (userChoice === true) {
            btnTrue.classList.add(isCorrect ? 'selected-correct' : 'selected-incorrect');
        } else {
            btnFalse.classList.add(isCorrect ? 'selected-correct' : 'selected-incorrect');
        }

        // Feedback auswerten
        if (isCorrect) {
            score++;
            feedbackBox.innerHTML = "Richtig! 👍";
            feedbackBox.style.color = "var(--success-color)";
        } else {
            feedbackBox.innerHTML = "Leider falsch! ❌";
            feedbackBox.style.color = "var(--error-color)";
        }

        // Erklärung anzeigen
        explanationBox.innerText = currentQuestion.explanation;
        explanationBox.style.display = 'block';

        // Steuerung umschalten
        if (currentQuestionIndex < quizData.length - 1) {
            nextButton.style.display = 'inline-block';
        } else {
            // Nach kurzem Delay das Endergebnis präsentieren
            setTimeout(showEndScreen, 1500);
        }
    }

    function nextQuestion() {
        currentQuestionIndex++;
        initQuestion();
    }

    function showEndScreen() {
        document.getElementById('quiz-content').style.display = 'none';
        nextButton.style.display = 'none';
        restartButton.style.display = 'inline-block';
        progressBox.innerText = "Auswertung";

        feedbackBox.innerHTML = `Quiz beendet! Du hast ${score} von ${quizData.length} Aussagen korrekt bewertet. 🎉`;
        feedbackBox.style.color = "var(--primary-color)";
    }

    function restartQuiz() {
        currentQuestionIndex = 0;
        score = 0;
        document.getElementById('quiz-content').style.display = 'block';
        initQuestion();
    }
</script>

</body>
</html>
